<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVES AVF - MKFPROD</title>
    <style>
        body { background: #000; color: #00FFFF; font-family: monospace; padding: 20px; }
        h1 { border-bottom: 2px solid #00FFFF; padding-bottom: 10px; font-size: 1.2rem; }
        .crisis-block { border: 1px solid #333; margin-bottom: 20px; padding: 10px; border-radius: 5px; }
        .crisis-header { color: #FFF; font-weight: bold; margin-bottom: 5px; background: #111; padding: 5px; }
        .event-line { color: #00FF00; font-size: 0.8rem; border-left: 2px solid #004400; padding-left: 10px; margin: 2px 0; }
        .nav-back { display: inline-block; margin-bottom: 20px; color: #FFF; text-decoration: none; border: 1px solid #FFF; padding: 5px 10px; border-radius: 5px; }
        #loading { text-align: center; margin-top: 50px; font-size: 1.5rem; }
    </style>
</head>
<body>
    <a href="index.html" class="nav-back">⬅️ RETOUR COCKPIT</a>
    <h1>ARCHIVES RÉCENTES (GITHUB)</h1>
    <div id="loading">CHARGEMENT DES PAQUETS...</div>
    <div id="archive-content"></div>

    <script>
        const GH_REPO = "mkfprod2025-cloud/AVF-CORE";
        
        async function fetchArchives() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GH_REPO}/issues?labels=crisis-log&state=all`);
                const issues = await response.json();
                document.getElementById('loading').style.display = 'none';
                
                const container = document.getElementById('archive-content');
                issues.forEach(issue => {
                    const block = document.createElement('div');
                    block.className = 'crisis-block';
                    
                    // Extraction du JSON dans le corps de l'issue
                    const body = issue.body;
                    const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/);
                    let eventsHtml = "";
                    
                    if (jsonMatch) {
                        try {
                            const events = JSON.parse(jsonMatch[1]);
                            eventsHtml = events.map(e => `<div class="event-line">[${e.time.split('T')[1].substring(0,8)}] ${e.event}</div>`).join('');
                        } catch(e) { eventsHtml = "Erreur de lecture des données."; }
                    }

                    block.innerHTML = `
                        <div class="crisis-header">${issue.title} (${issue.state === 'open' ? 'En attente moisson' : 'Archivé Cave'})</div>
                        <div class="events-container">${eventsHtml}</div>
                    `;
                    container.appendChild(block);
                });
                
                if (issues.length === 0) {
                    container.innerHTML = "<div style='text-align:center; color:#666;'>Aucune archive récente sur GitHub.</div>";
                }
            } catch (error) {
                document.getElementById('loading').innerText = "ERREUR DE CONNEXION GITHUB.";
            }
        }
        fetchArchives();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COCKPIT CRISIS v5.4.7</title>
    <link rel="icon" type="image/png" href="avficon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #000000; --accent: #00FFFF; --text-light: #ffffff; --restored: #0000FF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text-light); min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; overflow-y: auto; padding: env(safe-area-inset-top) 10px 120px 20px;
        }
        .header { width: 100%; text-align: center; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-header { width: 24px; height: 24px; margin-right: 8px; vertical-align: middle; }
        .title { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; }     
        .restored-badge { font-size: 0.6rem; color: #FFF; background: var(--restored); padding: 2px 5px; border-radius: 3px; font-weight: bold; margin-left: 5px; }  
        #sync-status { font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 5px; background: #333; color: #aaa; cursor: pointer; }
        #sync-status.online { background: #004400; color: #00FF00; }
        #crisis-banner { display: none; width: 100%; background: #FF0000; color: white; padding: 12px; text-align: center; font-weight: 900; border: 3px solid white; border-radius: 10px; margin-bottom: 15px; animation: blink-red 1s infinite; }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .grid-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 18px; flex-grow: 1; justify-content: center; }
        .grid-row { display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center; width: 100%; gap: 18px; }        
        .btn-circle { width: 62px; height: 62px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 900; border: 3px solid #FFF; color: #000; cursor: pointer; transition: opacity 0.2s; }
        .btn-circle i { font-size: 1.6rem; font-style: normal; margin-bottom: 2px; }
        .btn-circle.disabled { opacity: 0.3 !important; cursor: not-allowed; pointer-events: none; }
        #crisis-log { width: 100%; height: 90px; background: #111; border: 1px solid #333; border-radius: 8px; margin: 15px 0; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; color: #00FF00; line-height: 1.3; }
        .action-row { display: flex; justify-content: center; width: 100%; gap: 18px; }
        .btn-wide { flex: 1; height: 75px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 900; border: 3px solid #FFF; color: #000; cursor: pointer; }
        .btn-wide i { font-size: 2rem; font-style: normal; }     
        .btn-eau { background: #00FFFF; } .btn-nasal { background: #0080FF; } .btn-zombie { background: #FFFF00; border: 5px solid #FF0000; }
        .btn-fin { background: #FFF; border: 4px solid #00FF00; color: #000; } .btn-fin.active { background: #00FF00; color: #000; box-shadow: 0 0 30px #00FF00; border: 5px solid #FFF; }
        .btn-cafe { background: #FF00FF; } .btn-epaule { background: #FF0000; } .btn-night { background: #FFD700; }
        .btn-grign { background: #FFFF00; } .btn-agite { background: #FF00FF; } .btn-repas { background: #FF4500; }
        .btn-oeil { background: #FF0000; } .btn-ejection { background: #FF8C00; } .btn-menthe { background: #98FB98; }
        .btn-reson { background: #9370DB; } .btn-chal { background: #FFFF00; }
        #clock { font-family: monospace; font-size: 2.2rem; color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 10px; text-shadow: 0 0 10px var(--accent); }
        .footer-nav { width: 100%; display: flex; justify-content: space-between; padding: 15px 0; border-top: 1px solid #333; position: sticky; bottom: 0; background: #000; z-index: 100; align-items: center; }  
        .nav-link { color: #00FFFF; text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid #00FFFF; padding: 8px 12px; border-radius: 5px; }
        .sync-btn { color: #00FF00; font-weight: 900; cursor: pointer; background: #002200; padding: 10px 20px; border-radius: 10px; border: 2px solid #00FF00; }
        .logo-footer { width: 20px; height: 20px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title"><img src="avficon.png" class="logo-header">COCKPIT v5.5.0</div>
        <div id="sync-status" onclick="openConfig()">CONFIG ⚙️</div>     
    </div>
    <div id="crisis-banner">🚨 CRISE EN COURS 🚨</div>

    <!-- Modal de Configuration -->
    <div id="config-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; flex-direction:column; justify-content:center; align-items:center;">
        <div style="background:#111; padding:30px; border-radius:20px; border:2px solid var(--accent); width:100%; max-width:400px;">
            <h2 style="color:var(--accent); margin-bottom:20px; text-align:center;">CONFIGURATION</h2>
            <input type="password" id="cfg-token" placeholder="GitHub Token (PAT)" style="width:100%; padding:15px; margin-bottom:15px; background:#222; border:1px solid #444; color:white; border-radius:10px;">
            <input type="text" id="cfg-repo" placeholder="Repo (ex: user/repo)" style="width:100%; padding:15px; margin-bottom:25px; background:#222; border:1px solid #444; color:white; border-radius:10px;">
            <button onclick="saveConfig()" style="width:100%; background:var(--accent); color:black; padding:15px; border:none; border-radius:10px; font-weight:bold; font-size:1rem; cursor:pointer;">SAUVEGARDER</button>
            <button onclick="document.getElementById('config-modal').style.display='none'" style="width:100%; background:transparent; color:#666; padding:10px; border:none; margin-top:10px; cursor:pointer;">Annuler</button>
        </div>
    </div>
    <div class="grid-container">
        <div class="grid-row">
            <div class="btn-circle btn-eau" onclick="log('EAU', this)"><i>💧</i>EAU</div>
            <div class="btn-circle btn-cafe" onclick="log('CAFÉ', this)"><i>☕</i>CAFÉ</div>
            <div class="btn-circle btn-grign" onclick="log('GRIGN.', this)"><i>🍪</i>GRIGN.</div>
            <div class="btn-circle btn-repas" onclick="log('REPAS', this)"><i>🍽️</i>REPAS</div>
        </div>
        <div class="grid-row">
            <div class="btn-circle btn-nasal" onclick="log('NASAL', this)"><i>👃</i>NASAL</div>
            <div class="btn-circle btn-oeil" onclick="log('OEIL', this)"><i>👁️</i>OEIL</div>
            <div class="btn-circle btn-epaule" onclick="log('ÉPAULE', this)"><i>💪</i>ÉPAULE</div>
            <div class="btn-circle btn-chal" onclick="log('CHALEUR', this)"><i>🔥</i>CHAL.</div>
        </div>
        <div class="grid-row">
            <div class="btn-circle btn-agite" onclick="log('AGITÉ', this)"><i>🏃</i>AGITÉ</div>
            <div class="btn-circle btn-ejection" onclick="log('ÉJECTION', this)"><i>💥</i>ÉJECT.</div>
            <div class="btn-circle btn-menthe" onclick="log('MENTHE', this)"><i>🌿</i>MENTHE</div>
            <div class="btn-circle btn-reson" onclick="log('RESONNANCE', this)"><i>🔊</i>RESON.</div>
        </div>
        <div id="crisis-log">Prêt pour nouvelle crise.</div>       
        <div class="action-row">
            <div class="btn-wide btn-night" onclick="log('JOUR/NUIT', this)"><i>🌗</i>NIGHT</div>
            <div class="btn-wide btn-zombie" onclick="log('ZOMBIE', this)"><i>💥</i>ZOMBIE</div>
            <div id="btn-fin" class="btn-wide btn-fin" onclick="log('FIN DE CRISE', this)"><i>🏁</i>FIN</div>
        </div>
        <div id="clock">00:00:00</div>
    </div>
    <div class="footer-nav">
        <a href="archive.html" class="nav-link">📚 ARCHIVES</a>       
        <div class="sync-btn" onclick="sync()">ENVOYER PAQUET ⬆️</div>
        <img src="avficon.png" class="logo-footer">
        <div class="nav-link" style="color:#FF0000; border-color:#FF0000;" onclick="undo()">UNDO ↩️</div>
    </div>
    <script>
        let localQueue = JSON.parse(localStorage.getItem('avf_queue') || '[]');
        let isLocked = false;

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }
        setInterval(updateClock, 1000); updateClock();

        function openConfig() {
            document.getElementById('cfg-token').value = localStorage.getItem('gh_token') || "";
            document.getElementById('cfg-repo').value = localStorage.getItem('gh_repo') || "mkfprod2025-cloud/AVF-CORE";
            document.getElementById('config-modal').style.display = 'flex';
        }

        function saveConfig() {
            localStorage.setItem('gh_token', document.getElementById('cfg-token').value);
            localStorage.setItem('gh_repo', document.getElementById('cfg-repo').value);
            document.getElementById('config-modal').style.display = 'none';
            checkSyncStatus();
        }

        function checkSyncStatus() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            const status = document.getElementById('sync-status');
            if (token && repo) {
                status.innerText = "AUTONOME ✔️";
                status.style.background = "#004400";
                status.style.color = "#00FF00";
            } else {
                status.innerText = "CONFIG REQUIS ⚠️";
                status.style.background = "#440000";
                status.style.color = "#FF0000";
            }
        }
        checkSyncStatus();

        function checkUIState() {
            const hasEvents = localQueue.length > 0;
            const isFin = localQueue.some(e => e.event === 'FIN DE CRISE');
            document.getElementById('crisis-banner').style.display = (hasEvents && !isFin) ? 'block' : 'none';
            document.getElementById('btn-fin').classList.toggle('active', hasEvents && !isFin);
            const logDiv = document.getElementById('crisis-log');
            if(hasEvents) {
                logDiv.innerHTML = localQueue.map(e => {
                    const localTime = new Date(e.time).toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris' });
                    return `[${localTime}] ${e.event}`;
                }).reverse().join('<br>');
            } else { logDiv.innerHTML = "Prêt pour nouvelle crise."; }
        }

        function log(event, element) {
            if(isLocked) return;
            let pwd = localStorage.getItem('avf_pwd');
            if (pwd !== '152397') {
                pwd = prompt("CODE MKFPROD :");
                if (pwd === '152397') localStorage.setItem('avf_pwd', pwd); else return;
            }
            isLocked = true;
            if(element) element.classList.add('disabled');
            setTimeout(() => { isLocked = false; if(element) element.classList.remove('disabled'); }, 2000);

            if (navigator.vibrate) navigator.vibrate(50);
            localQueue.push({ event, time: new Date().toISOString() });
            localStorage.setItem('avf_queue', JSON.stringify(localQueue));
            checkUIState();
        }

        async function pushToGitHub(events) {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            
            // On utilise l'heure du premier événement de la crise pour le titre avec fuseau horaire explicite
            const firstTime = new Date(events[0].time).toLocaleString('fr-FR', { timeZone: 'Europe/Paris' });
            
            const payload = {
                title: `[CRISIS] ${firstTime}`,
                body: "```json\n" + JSON.stringify(events, null, 2) + "\n```",
                labels: ["crisis-log"]
            };

            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                return r.ok;
            } catch(e) { return false; }
        }

        async function sync() {
            if (localQueue.length === 0) return;
            if (!localStorage.getItem('gh_token')) { alert("Configurez GitHub d'abord (Bouton CONFIG)."); openConfig(); return; }
            
            let crises = [];
            let currentCrisis = [];
            
            localQueue.forEach(e => {
                currentCrisis.push(e);
                if (e.event === 'FIN DE CRISE') {
                    crises.push([...currentCrisis]);
                    currentCrisis = [];
                }
            });
            if (currentCrisis.length > 0) crises.push(currentCrisis);

            let successCount = 0;
            for (const crisis of crises) {
                const ok = await pushToGitHub(crisis);
                if (ok) successCount++;
            }

            if (successCount === crises.length) {
                alert("Succès ! " + successCount + " crise(s) envoyée(s) à la Librairie.");
                localQueue = []; localStorage.setItem('avf_queue', '[]'); checkUIState();
            } else {
                alert("Erreur partielle : " + successCount + "/" + crises.length + " envoyées. Vérifiez votre connexion ou votre Token.");
            }
        }

        function undo() { if (localQueue.length > 0 && confirm("Annuler ?")) { localQueue.pop(); localStorage.setItem('avf_queue', JSON.stringify(localQueue)); checkUIState(); } }
        checkUIState();
    </script>
</body>
</html>

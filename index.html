<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COCKPIT CRISIS v5.3.0-GH</title>
    <link rel="icon" type="image/x-icon" href="avficon.ico">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #000000;
            --accent: #00FFFF;
            --text-light: #ffffff;
            --restored: #0000FF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text-light);     
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; overflow-y: auto; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 20px;
        }

        .header { width: 100%; text-align: center; padding: 5px 0; display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; }
        .title { font-size: 1.1rem; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }     
        .restored-badge { font-size: 0.6rem; color: #FFF; background: var(--restored); padding: 2px 5px; border-radius: 3px; font-weight: bold; margin-left: 5px; animation: blink 2s infinite; }  

        #sync-status { font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 5px; background: #333; color: #aaa; }
        #sync-status.online { background: #004400; color: #00FF00; }
        #sync-status.pending { background: #444400; color: #FFFF00; animation: blink 1s infinite; }

        #crisis-banner {
            display: none; width: 100%; background: #FF0000; color: white;
            padding: 8px; text-align: center; font-weight: 900; border: 3px solid white;
            border-radius: 10px; margin-bottom: 5px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .grid-container {
            width: 100%; max-width: 450px; display: flex; flex-direction: column;
            gap: 8px; flex-grow: 1; justify-content: center;    
        }

        .grid-row { display: grid; grid-template-columns: repeat(4, 1fr); justify-items: center; width: 100%; gap: 10px; }        

        .btn-circle {
            width: 62px; height: 62px; border-radius: 50%;       
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.55rem; font-weight: 900; border: 3px solid #FFF;
            color: #000;
        }
        .btn-circle i { font-size: 1.6rem; font-style: normal; margin-bottom: 2px; }

        #crisis-log {
            width: 100%; height: 60px; background: #111; border: 1px solid #333;
            border-radius: 8px; margin: 10px 0; padding: 5px; overflow-y: auto;
            font-family: monospace; font-size: 0.7rem; color: #00FF00;
        }

        .action-row { display: flex; justify-content: center; width: 100%; gap: 10px; }
        .btn-wide {
            flex: 1; height: 75px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 900; border: 3px solid #FFF;
            color: #000;
        }
        .btn-wide i { font-size: 2rem; font-style: normal; }     

        /* COULEURS */
        .btn-eau { background: #00FFFF; }
        .btn-nasal { background: #0080FF; }
        .btn-zombie { background: #FFFF00; border: 5px solid #FF0000; }
        .btn-fin { background: #FFF; border: 4px solid #00FF00; color: #000; }
        .btn-fin.active { background: #00FF00; color: #000; box-shadow: 0 0 30px #00FF00; }

        .btn-cafe { background: #FF00FF; }
        .btn-epaule { background: #FF0000; }
        .btn-night { background: #FFD700; }
        .btn-grign { background: #FFFF00; }
        .btn-agite { background: #FF00FF; }
        .btn-repas { background: #FF4500; }
        .btn-oeil { background: #FF0000; }
        .btn-ejection { background: #FF8C00; } /* ORANGE ÉJECTION */
        .btn-menthe { background: #98FB98; } /* VERT MENTHE */
        .btn-reson { background: #9370DB; } /* VIOLET RESONNANCE */
        .btn-chal { background: #FFFF00; }

        #clock {
            font-family: monospace; font-size: 2rem; color: var(--accent);
            font-weight: 900; text-shadow: 0 0 10px var(--accent);
            text-align: center; margin-bottom: 10px;
        }

        .footer-nav { width: 100%; display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #333; }  
        .nav-link { color: #666; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        .undo { color: #FF0000; }
        .sync-btn { color: #00FF00; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">COCKPIT v5.3.0 <span class="restored-badge">GITHUB SYNC</span></div>
        <div id="sync-status" onclick="config_git()">CONFIG ⚙️</div>     
    </div>

    <div id="crisis-banner">🚨 CRISE EN COURS 🚨</div>

    <div class="grid-container">
        <div class="grid-row">
            <div class="btn-circle btn-eau" onclick="log('EAU', this)"><i>💧</i>EAU</div>
            <div class="btn-circle btn-cafe" onclick="log('CAFÉ', this)"><i>☕</i>CAFÉ</div>
            <div class="btn-circle btn-grign" onclick="log('GRIGN.', this)"><i>🍪</i>GRIGN.</div>
            <div class="btn-circle btn-repas" onclick="log('REPAS', this)"><i>🍽️</i>REPAS</div>
        </div>

        <div class="grid-row">
            <div class="btn-circle btn-nasal" onclick="log('NASAL', this)"><i>👃</i>NASAL</div>
            <div class="btn-circle btn-oeil" onclick="log('OEIL', this)"><i>👁️</i>OEIL</div>
            <div class="btn-circle btn-epaule" onclick="log('ÉPAULE', this)"><i>💪</i>ÉPAULE</div>
            <div class="btn-circle btn-chal" onclick="log('CHALEUR', this)"><i>🔥</i>CHAL.</div>
        </div>

        <div class="grid-row">
            <div class="btn-circle btn-agite" onclick="log('AGITÉ', this)"><i>🏃</i>AGITÉ</div>
            <div class="btn-circle btn-ejection" onclick="log('ÉJECTION', this)"><i>💥</i>ÉJECT.</div>
            <div class="btn-circle btn-menthe" onclick="log('MENTHE', this)"><i>🌿</i>MENTHE</div>
            <div class="btn-circle btn-reson" onclick="log('RESONNANCE', this)"><i>🔊</i>RESON.</div>
        </div>

        <div id="crisis-log">Attente d'événements...</div>       

        <div class="action-row">
            <div class="btn-wide btn-night" onclick="log('JOUR/NUIT', this)"><i>🌗</i>NIGHT</div>
            <div class="btn-wide btn-zombie" onclick="log('ZOMBIE', this)"><i>💥</i>ZOMBIE</div>
            <div id="btn-fin" class="btn-wide btn-fin" onclick="log('FIN DE CRISE', this)"><i>🏁</i>FIN</div>
        </div>

        <div id="clock">00:00:00</div>
    </div>

    <div class="footer-nav">
        <a href="https://github.com/mkfprod/AVF-CORE/issues" target="_blank" class="nav-link">📚 ARCHIVES GH</a>       
        <div class="sync-btn" onclick="sync()">ENVOYER PAQUET ⬆️</div>
        <div class="nav-link undo" onclick="undo()">ANNULER ↩️</div>
    </div>

    <script>
        let localQueue = JSON.parse(localStorage.getItem('avf_queue') || '[]');

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }
        setInterval(updateClock, 1000); updateClock();

        function config_git() {
            const token = prompt("GITHUB TOKEN (PAT) :");
            const repo = prompt("REPO (ex: mkfprod/AVF-CORE) :");
            if(token && repo) {
                localStorage.setItem('gh_token', token);
                localStorage.setItem('gh_repo', repo);
                alert("Configuration GitHub Sauvegardée.");
            }
        }

        function log(event, element) {
            let pwd = localStorage.getItem('avf_pwd');
            if (!pwd || pwd !== '152397') {
                pwd = prompt("CODE MKFPROD :");
                if (pwd === '152397') localStorage.setItem('avf_pwd', pwd);
                else return;
            }

            if (element) {
                element.style.opacity = "0.5";
                setTimeout(() => { element.style.opacity = "1"; }, 100);
            }
            if (navigator.vibrate) navigator.vibrate(50);        

            const payload = { event, pwd, time: new Date().toISOString().replace('T', ' ').substring(0, 19) };
            localQueue.push(payload);
            localStorage.setItem('avf_queue', JSON.stringify(localQueue));
            document.getElementById('crisis-log').innerHTML = localQueue.map(e => `[${e.time.split(' ')[1]}] ${e.event}`).reverse().join('<br>');
            
            if(event === 'FIN DE CRISE') {
                document.getElementById('btn-fin').classList.add('active');
                document.getElementById('crisis-banner').style.display = 'block';
            }
        }

        function sync() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            if (!token || !repo) { alert("Configurez GitHub d'abord (Bouton CONFIG)."); return; }
            if (localQueue.length === 0) { alert("Rien à envoyer."); return; }

            const timestamp = new Date().toISOString();
            const body = {
                title: `[CRISIS_PACKET] ${timestamp}`,
                body: "```json\n" + JSON.stringify(localQueue, null, 2) + "\n```",
                labels: ["crisis-log"]
            };

            fetch(`https://api.github.com/repos/${repo}/issues`, {
                method: 'POST',
                headers: { 
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify(body)
            }).then(r => {
                if(r.ok) {
                    alert("Paquet envoyé à GitHub !");
                    localQueue = [];
                    localStorage.setItem('avf_queue', '[]');
                    document.getElementById('crisis-log').innerHTML = "Prêt.";
                    document.getElementById('btn-fin').classList.remove('active');
                    document.getElementById('crisis-banner').style.display = 'none';
                } else {
                    alert("Erreur d'envoi. Vérifiez votre Token.");
                }
            });
        }

        function undo() {
            if (confirm("Annuler dernier clic ?")) {
                localQueue.pop();
                localStorage.setItem('avf_queue', JSON.stringify(localQueue));
                document.getElementById('crisis-log').innerHTML = localQueue.map(e => `[${e.time.split(' ')[1]}] ${e.event}`).reverse().join('<br>');
            }
        }
    </script>
</body>
</html>

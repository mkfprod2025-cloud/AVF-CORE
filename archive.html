<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVES AVF - MKFPROD</title>
    <style>
        body { background: #000; color: #FFF; font-family: monospace; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00FFFF; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 1.2rem; font-weight: 900; color: #00FFFF; text-transform: uppercase; }
        .nav-back { color: #FFF; text-decoration: none; border: 1px solid #FFF; padding: 5px 12px; border-radius: 5px; font-weight: bold; }
        
        .crisis-block { border: 1px solid #333; margin-bottom: 20px; padding: 0; border-radius: 8px; overflow: hidden; background: #050505; }
        .crisis-header { background: #111; padding: 10px; font-size: 0.8rem; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .date { color: #00FFFF; font-weight: bold; }
        .status { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-pending { background: #444400; color: #FFFF00; }
        .status-sync { background: #004400; color: #00FF00; }
        
        .events-area { padding: 10px; }
        .event-line { border-left: 3px solid #00FFFF; padding-left: 12px; margin: 5px 0; font-size: 0.85rem; line-height: 1.4; }
        .time { color: #008888; font-weight: bold; margin-right: 8px; }
        .label { color: #00FF00; font-weight: 900; }

        #loading { text-align: center; color: #00FFFF; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">LA GRANDE LIBRAIRIE</div>
        <a href="index.html" class="nav-back">RETOUR</a>
    </div>

    <div id="loading">SYNCHRONISATION DES ARCHIVES...</div>
    <div id="content"></div>

    <script>
        const GH_REPO = "mkfprod2025-cloud/AVF-CORE";
        
        async function load() {
            try {
                const r = await fetch(`https://api.github.com/repos/${GH_REPO}/issues?labels=crisis-log&state=all&per_page=25`);
                const issues = await r.json();
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('content');

                if (!issues.length) {
                    container.innerHTML = "<div style='text-align:center;color:#444;margin-top:50px;'>Aucune archive disponible.</div>";
                    return;
                }

                issues.forEach(issue => {
                    const block = document.createElement('div');
                    block.className = 'crisis-block';
                    
                    const jsonMatch = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    let eventsHtml = "";
                    if (jsonMatch) {
                        try {
                            const events = JSON.parse(jsonMatch[1]);
                            eventsHtml = events.map(e => {
                                const t = e.time ? (e.time.includes('T') ? e.time.split('T')[1].substring(0,5) : e.time) : "??:??";
                                return `<div class="event-line"><span class="time">[${t}]</span> <span class="label">${e.event}</span></div>`;
                            }).join('');
                        } catch(e) { eventsHtml = "<div style='color:red;padding:10px;'>ERREUR FORMAT DONNÉES</div>"; }
                    }

                    const date = new Date(issue.created_at).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                    const statusClass = issue.state === 'open' ? 'status-pending' : 'status-sync';
                    const statusText = issue.state === 'open' ? 'EN ATTENTE CAVE' : 'ARCHIVÉ CAVE';

                    block.innerHTML = `
                        <div class="crisis-header">
                            <span class="date">📅 ${date}</span>
                            <span class="status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="events-area">${eventsHtml}</div>
                    `;
                    container.appendChild(block);
                });
            } catch(e) {
                document.getElementById('loading').innerText = "ERREUR RÉSEAU GITHUB";
            }
        }
        load();
    </script>
</body>
</html>

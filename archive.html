<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHIVES AVF - MKFPROD</title>
    <style>
        body { background: #000; color: #FFF; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 1rem; font-weight: 900; color: #00FFFF; letter-spacing: 1px; }
        .nav-back { color: #FFF; text-decoration: none; font-size: 0.8rem; border: 1px solid #FFF; padding: 4px 10px; border-radius: 5px; }
        
        .crisis-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .crisis-time { color: #666; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .status-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; }
        .status-open { background: #444400; color: #FFFF00; }
        .status-closed { background: #004400; color: #00FF00; }
        
        .event-list { border-left: 2px solid #00FFFF; padding-left: 10px; margin-top: 5px; }
        .event-item { font-family: monospace; font-size: 0.75rem; color: #00FF00; margin: 3px 0; }
        .event-time { color: #008888; margin-right: 5px; }

        #loading { text-align: center; color: #00FFFF; margin-top: 50px; font-weight: bold; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">ARCHIVES RÉCENTES</div>
        <a href="index.html" class="nav-back">⬅️ COCKPIT</a>
    </div>

    <div id="loading" class="pulse">SYNCHRONISATION GITHUB...</div>
    <div id="content"></div>

    <script>
        const GH_REPO = "mkfprod2025-cloud/AVF-CORE";
        
        async function loadArchives() {
            try {
                const r = await fetch(`https://api.github.com/repos/${GH_REPO}/issues?labels=crisis-log&state=all&per_page=20`);
                const issues = await r.json();
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('content');

                if (issues.length === 0) {
                    container.innerHTML = "<div style='text-align:center;color:#444;margin-top:40px;'>Aucun paquet récent sur GitHub.</div>";
                    return;
                }

                issues.forEach(issue => {
                    const card = document.createElement('div');
                    card.className = 'crisis-card';
                    
                    const jsonMatch = issue.body.match(/```json\n([\s\S]*?)\n```/);
                    let eventsHtml = "";
                    if (jsonMatch) {
                        try {
                            const events = JSON.parse(jsonMatch[1]);
                            eventsHtml = events.map(e => `
                                <div class="event-item">
                                    <span class="event-time">${e.time.split('T')[1].substring(0,5)}</span> ${e.event}
                                </div>
                            `).join('');
                        } catch(e) { eventsHtml = "<div style='color:red'>Erreur data</div>"; }
                    }

                    const dateStr = new Date(issue.created_at).toLocaleString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                    const statusClass = issue.state === 'open' ? 'status-open' : 'status-closed';
                    const statusText = issue.state === 'open' ? 'EN ATTENTE CAVE' : 'ARCHIVÉ CAVE';

                    card.innerHTML = `
                        <div class="crisis-time">
                            <span>📅 ${dateStr}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="event-list">${eventsHtml}</div>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {
                document.getElementById('loading').innerText = "ERREUR RÉSEAU GITHUB";
            }
        }
        loadArchives();
    </script>
</body>
</html>
